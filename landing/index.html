  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FAFAF8;--surface:#fff;--text:#1A1A18;--text-2:#7A7A72;--text-3:#AEAEA6;
      --accent:#E8590C;--accent-hover:#D14E0A;--accent-light:rgba(232,89,12,0.06);
      --border:rgba(0,0,0,0.06);--shadow:0 2px 20px rgba(0,0,0,0.06);
      --radius:16px;--radius-lg:22px;
    }
    html{height:100%}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100%;-webkit-font-smoothing:antialiased}

    .page{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}

    /* ── Logo ── */
    .logo{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:48px;animation:fadeIn .6s ease both}
    .logo-mark{position:relative;width:80px;height:80px}
    .logo-bowl{width:80px;height:80px}
    .logo-name{font-size:1.7rem;font-weight:600;color:var(--text);letter-spacing:-.02em}
    .logo-tagline{font-size:.82rem;color:var(--text-3);margin-top:-8px;letter-spacing:.03em}

    /* ── Search ── */
    .search-area{width:100%;max-width:580px;position:relative;z-index:10;animation:fadeIn .6s ease .1s both}
    .search-box{
      display:flex;align-items:center;gap:12px;
      padding:14px 18px;
      border-radius:var(--radius);
      background:var(--surface);
      border:1.5px solid var(--border);
      box-shadow:var(--shadow);
      transition:border-color .2s,box-shadow .2s;
    }
    .search-box:focus-within{border-color:rgba(232,89,12,.35);box-shadow:0 0 0 4px rgba(232,89,12,.06),0 2px 20px rgba(0,0,0,.06)}
    .search-icon{flex-shrink:0;color:var(--text-3);transition:color .2s}
    .search-box:focus-within .search-icon{color:var(--accent)}
    .search-input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:1rem;color:var(--text);caret-color:var(--accent)}
    .search-input::placeholder{color:var(--text-3)}
    .clear-btn{display:none;border:none;background:none;cursor:pointer;color:var(--text-3);padding:4px;flex-shrink:0;transition:color .15s}
    .clear-btn:hover{color:var(--text)}
    .clear-btn.on{display:block}
    .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite;display:none;flex-shrink:0}
    .spinner.on{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Dropdown ── */
    .dd{
      position:absolute;top:calc(100% + 6px);left:0;right:0;
      border-radius:var(--radius);
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:0 12px 48px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.04);
      max-height:0;opacity:0;overflow:hidden;
      transition:max-height .25s cubic-bezier(.16,1,.3,1),opacity .15s ease;
    }
    .dd.open{max-height:440px;opacity:1;overflow-y:auto;overflow-x:hidden}
    .dd::-webkit-scrollbar{width:5px}
    .dd::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:3px}

    /* ── Dish row ── */
    .row{display:flex;align-items:center;gap:14px;padding:10px 16px;cursor:pointer;transition:background .12s;animation:rowIn .18s ease both}
    .row:nth-child(2){animation-delay:25ms}
    .row:nth-child(3){animation-delay:50ms}
    .row:nth-child(4){animation-delay:75ms}
    .row:nth-child(5){animation-delay:100ms}
    .row:nth-child(6){animation-delay:125ms}
    .row:nth-child(7){animation-delay:150ms}
    @keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .row:hover,.row.active{background:var(--accent-light)}
    .row-img{width:48px;height:48px;aspect-ratio:1;border-radius:12px;object-fit:cover;flex-shrink:0;background:#F0F0EC}
    .row-img[src=""]{display:none}
    .row-avatar{width:48px;height:48px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:600;font-size:1.1rem;color:#fff}
    .row-body{flex:1;min-width:0}
    .row-name{font-size:.95rem;font-weight:500;color:var(--text);line-height:1.3}
    .row-name .hl{color:var(--accent);font-weight:600}
    .row-meta{font-size:.72rem;color:var(--text-3);margin-top:1px;display:flex;align-items:center;gap:5px}
    .row-meta .sep{width:3px;height:3px;border-radius:50%;background:var(--text-3);opacity:.5;flex-shrink:0}
    .row-arrow{color:var(--text-3);opacity:0;transition:opacity .12s;flex-shrink:0}
    .row:hover .row-arrow{opacity:.5}

    .dd-empty{padding:32px 20px;text-align:center;color:var(--text-3);font-size:.85rem}
    .dd-empty small{display:block;margin-top:4px;color:var(--text-3);opacity:.6;font-size:.75rem}

    /* ── Hints ── */
    .hints{margin-top:24px;font-size:.78rem;color:var(--text-3);text-align:center;animation:fadeIn .6s ease .2s both}
    .hint{color:var(--accent);background:none;border:none;font:inherit;cursor:pointer;font-weight:500}
    .hint:hover{text-decoration:underline}

    .footer{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-size:.7rem;color:var(--text-3);opacity:.4;animation:fadeIn .6s ease .3s both}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @media(prefers-reduced-motion:reduce){.logo,.search-area,.hints,.footer,.row{animation:none!important;opacity:1}.dd{transition:none!important}.spinner{animation:none!important}}
    @media(max-width:480px){.logo-mark{width:64px;height:64px}.logo-bowl{width:64px;height:64px}.logo-name{font-size:1.4rem}.search-input{font-size:.95rem}.row-img{width:40px;height:40px;border-radius:10px}}
  </style>

</head>

// Cuisine → color for avatar backgrounds
const CC={Thai:'#E8590C',Korean:'#D14E0A',Japanese:'#B84500',Vietnamese:'#059669',Chinese:'#C44408',Indian:'#D97706',Indonesian:'#9A3412',default:'#9A3412'};

// ── Fuse.js setup for fuzzy local search ──
const fuse=new Fuse(localDishes,{
  keys:[
    {name:'name',weight:0.6},
    {name:'tags',weight:0.25},
    {name:'cuisine',weight:0.15},
  ],
  threshold:0.4,
  includeScore:true,
  minMatchCharLength:2,
});

// Score a name against a query for uniform ranking
function scoreMatch(name,query){
  const n=name.toLowerCase(),qr=query.toLowerCase();
  if(n===qr)return 100;
  if(n.startsWith(qr))return 85;
  if(qr.length>2&&n.includes(qr))return 70;
  const words=qr.split(/\s+/);
  if(words.length>1&&words.every(w=>n.includes(w)))return 55;
  return 0;
}

// Search local DB with Fuse.js, return unified format
function searchLocal(query){
  if(!query.trim()||query.length<2)return[];
  const exactResults=localDishes
    .map(d=>{const sc=scoreMatch(d.name,query);return sc>0?{...d,_score:sc}:null})
    .filter(Boolean);
  // Then do fuzzy search via Fuse.js
  const fuseResults=fuse.search(query).map(r=>({
    ...r.item,
    _score:Math.round(20+(1-r.score)*50), // Map Fuse 0-1 score to 20-70 range
  }));
  // Merge: exact matches take priority, then fuse fills in
  const seen=new Set();
  const merged=[];
  for(const d of exactResults.sort((a,b)=>b._score-a._score)){
    const k=d.name.toLowerCase();
    if(!seen.has(k)){seen.add(k);merged.push(d)}
  }
  for(const d of fuseResults){
    const k=d.name.toLowerCase();
    if(!seen.has(k)){seen.add(k);merged.push(d)}
  }
  return merged.sort((a,b)=>b._score-a._score);
}

// Fetch from TheMealDB (free, no key, good images for famous dishes)
async function fetchMealDB(query){
  if(ac)ac.abort();
  ac=new AbortController();
  const r=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`,{signal:ac.signal});
  const d=await r.json();
  return(d.meals||[]).map(m=>({
    name:m.strMeal,
    cuisine:m.strArea||'',
    category:m.strCategory||'',
    tags:m.strTags||'',
    image:m.strMealThumb||null,
    _api:true,
  }));
}

// Merge local + API results, deduplicate, rank, cap at 7
// When a local dish matches an API dish, steal the API image
function mergeResults(local,api,query){
  // Build a lookup of API images by lowercase name
  const apiByName=new Map();
  for(const d of api){
    const k=d.name.toLowerCase();
    if(!apiByName.has(k))apiByName.set(k,d);
  }

  const seen=new Set();
  const all=[];
  for(const d of local){
    const k=d.name.toLowerCase();
    if(!seen.has(k)){
      seen.add(k);
      const apiMatch=apiByName.get(k);
      // Keep local image if we have one, only grab API image if local has none
      all.push(apiMatch?{...d,image:d.image||apiMatch.image,time:apiMatch.time||d.time}:d);
    }
  }
  for(const d of api){
    const k=d.name.toLowerCase();
    if(!seen.has(k)){
      let sc=scoreMatch(d.name,query);
      if(sc===0)sc=25;
      seen.add(k);
      all.push({...d,_score:sc});
    }
  }
  all.sort((a,b)=>(b._score||0)-(a._score||0));
  return all.slice(0,7);
}

// Highlight matching text
function hl(text,query){
  if(!query)return text;
  const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${escaped})`,'gi'),'<span class="hl">$1</span>');
}

// Render dropdown results — skip full DOM rebuild if only the query highlight changed
let lastDishKey='';
function render(items,query){
  ai=-1;
  if(!items.length&&query.trim()){
    lastDishKey='';
    dd.innerHTML='<div class="dd-empty">No dishes found<small>Try a different name</small></div>';
    dd.classList.add('open');return;
  }
  if(!items.length){lastDishKey='';dd.classList.remove('open');return}

  // If same dishes in same order, just update highlights — no image flash
  const dishKey=items.map(d=>d.name).join('|');
  if(dishKey===lastDishKey){
    dd.querySelectorAll('.row-name').forEach((el,i)=>{
      if(items[i])el.innerHTML=hl(items[i].name,query);
    });
    dd.classList.add('open');
    q.setAttribute('aria-expanded','true');
    return;
  }
  lastDishKey=dishKey;

  dd.innerHTML=items.map((d,i)=>{
    const safeName=d.name.replace(/'/g,"\\'");
    const initial=d.name.charAt(0).toUpperCase();
    const bgCol=CC[d.cuisine]||CC.default;
    const hasImg=!!d.image;
    const imgHtml=hasImg
      ?`<img class="row-img" src="${d.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-avatar\\' style=\\'background:${bgCol}\\'>${initial}</div>'">`
      :`<div class="row-avatar" style="background:${bgCol}">${initial}</div>`;
    const meta=[d.cuisine,d.category,d.time?`${d.time} min`:''].filter(Boolean);
    const metaHtml=meta.map((m,j)=>(j>0?'<span class="sep"></span>':'')+`<span>${m}</span>`).join('');
    return`<div class="row" role="option" data-i="${i}" data-n="${d.name}" onclick="pick('${safeName}')">
      ${imgHtml}
      <div class="row-body">
        <div class="row-name">${hl(d.name,query)}</div>
        <div class="row-meta">${metaHtml}</div>
      </div>
      <svg class="row-arrow" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.5 1l5 5-5 5"/></svg>
    </div>`}).join('');
  dd.classList.add('open');
  q.setAttribute('aria-expanded','true');
}

function mark(){dd.querySelectorAll('.row').forEach((e,i)=>e.classList.toggle('active',i===ai))}

function pick(n){
  q.value=n;dd.classList.remove('open');q.setAttribute('aria-expanded','false');
  const dish=localDishes.find(d=>d.name===n);
  const p=new URLSearchParams({dish:n});
  if(dish?.image)p.set('img',dish.image);
  if(dish?.cuisine)p.set('cuisine',dish.cuisine);
  window.location.href='/recipe?'+p;
}

function go(t){q.value=t;q.focus();doSearch(t)}

async function doSearch(s){
  if(!s.trim()){dd.classList.remove('open');sp.classList.remove('on');return}
  const local=searchLocal(s);
  // Skip redundant local render — input handler already did it
  sp.classList.add('on');
  try{
    const api=await fetchMealDB(s);
    render(mergeResults(local,api,s),s);
  }catch(e){
    if(e.name!=='AbortError')console.error(e);
  }finally{
    sp.classList.remove('on');
  }
}

q.addEventListener('input',()=>{
  clearTimeout(dt);
  const s=q.value;
  // Render local results immediately
  const local=searchLocal(s);
  if(local.length||!s.trim()){
    render(s.trim()?local.slice(0,7):[],s);
  }
  // Debounce API call
  dt=setTimeout(()=>doSearch(s),300);
});

q.addEventListener('keydown',e=>{
  const rows=dd.querySelectorAll('.row');
  if(!rows.length)return;
  if(e.key==='Tab'){e.preventDefault();const target=ai>=0?rows[ai]:rows[0];if(target){q.value=target.dataset.n;cl.classList.add('on');clearTimeout(dt);const s=q.value;const local=searchLocal(s);render(s.trim()?local.slice(0,7):[],s);dt=setTimeout(()=>doSearch(s),300)}}
  else if(e.key==='ArrowDown'){e.preventDefault();ai=Math.min(ai+1,rows.length-1);mark();rows[ai]?.scrollIntoView({block:'nearest'})}
  else if(e.key==='ArrowUp'){e.preventDefault();ai=Math.max(ai-1,0);mark();rows[ai]?.scrollIntoView({block:'nearest'})}
  else if(e.key==='Enter'&&ai>=0){e.preventDefault();pick(rows[ai]?.dataset.n)}
  else if(e.key==='Escape'){dd.classList.remove('open');q.blur()}
});

document.addEventListener('click',e=>{if(!document.getElementById('sc').contains(e.target))dd.classList.remove('open')});

// Clear button
cl.addEventListener('click',()=>{q.value='';cl.classList.remove('on');dd.classList.remove('open');q.focus()});
q.addEventListener('input',()=>{cl.classList.toggle('on',q.value.length>0)});

// Randomized hint suggestions
function randomHints(){
  const pool=localDishes.filter(d=>d.image).sort(()=>Math.random()-.5).slice(0,5);
  document.getElementById('hints').innerHTML=pool.map((d,i)=>
    (i>0?' &middot; ':'')+`<button class="hint" onclick="go('${d.name.replace(/'/g,"\\'")}')">${d.name}</button>`
  ).join('');
}
randomHints();

setTimeout(()=>q.focus(),400);
</script>
